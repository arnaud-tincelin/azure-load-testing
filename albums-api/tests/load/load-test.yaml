version: v0.1
testId: albums-api-load-test
displayName: Albums API Progressive Load Test
testType: JMX
testPlan: album-api-load-test.jmx
description: Progressive load test for the Albums API
engineInstances: 5
env:
  - name: HOST
    value: ${SERVICE_ALBUMS_API_ENDPOINT_URL}
  - name: PORT
    value: "443"
  - name: PROTOCOL
    value: https
failureCriteria:
  - avg(response_time_ms) > 500
  - percentage(error) > 1
  - p95(response_time_ms) > 500
  - p99(response_time_ms) > 1000
autoStop:
  errorPercentage: 80
  timeWindow: 60
