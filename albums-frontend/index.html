<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Marketplace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.5rem; }
    #cart-badge { background: #e94560; color: #fff; border-radius: 50%; padding: 0.25rem 0.6rem; font-size: 0.85rem; cursor: pointer; }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
    .filters label { font-weight: 600; }
    .filters select, .filters input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    .filters button { padding: 0.5rem 1rem; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .album-card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .album-card:hover { transform: translateY(-2px); }
    .album-card h3 { margin-bottom: 0.25rem; }
    .album-card .artist { color: #666; margin-bottom: 0.5rem; }
    .album-card .genre { display: inline-block; background: #e8e8e8; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem; margin-bottom: 0.5rem; }
    .album-card .price { font-size: 1.2rem; font-weight: 700; color: #e94560; }
    .album-card .stock { font-size: 0.85rem; color: #888; }
    .album-card .actions { margin-top: 1rem; }
    .btn-add { padding: 0.5rem 1rem; background: #0f3460; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .btn-add:disabled { background: #ccc; cursor: not-allowed; }
    .btn-add:hover:not(:disabled) { background: #16213e; }

    /* Cart panel */
    .cart-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.4); z-index: 10; }
    .cart-overlay.open { display: block; }
    .cart-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 400px; max-width: 90vw; background: #fff; z-index: 11; padding: 2rem; overflow-y: auto; box-shadow: -4px 0 12px rgba(0,0,0,0.15); }
    .cart-panel h2 { margin-bottom: 1rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
    .cart-item .info { flex: 1; }
    .cart-item .info .title { font-weight: 600; }
    .cart-item .info .detail { font-size: 0.85rem; color: #666; }
    .btn-remove { background: #e94560; color: #fff; border: none; border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.8rem; }
    .cart-total { margin-top: 1rem; font-size: 1.2rem; font-weight: 700; }
    .btn-clear { margin-top: 1rem; padding: 0.5rem 1rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    .btn-close-cart { background: none; border: none; font-size: 1.5rem; cursor: pointer; float: right; }
    .empty-cart { color: #888; text-align: center; padding: 2rem; }

    /* Album detail modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 20; justify-content: center; align-items: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; padding: 2rem; max-width: 500px; width: 90%; position: relative; }
    .modal .btn-close { position: absolute; top: 0.5rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    .modal h2 { margin-bottom: 0.5rem; }
    .modal .meta { color: #666; margin-bottom: 1rem; }
    .modal .description { margin-bottom: 1rem; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>🎵 Album Marketplace</h1>
    <span id="cart-badge" data-testid="cart-badge" onclick="toggleCart()">🛒 <span id="cart-count">0</span></span>
  </header>

  <main>
    <div class="filters">
      <label for="genre-filter">Genre:</label>
      <select id="genre-filter" data-testid="genre-filter">
        <option value="">All Genres</option>
      </select>
      <label for="price-filter">Max Price:</label>
      <input id="price-filter" data-testid="price-filter" type="number" placeholder="e.g. 20" min="0" step="0.01">
      <button onclick="applyFilters()" data-testid="apply-filters">Filter</button>
      <button onclick="clearFilters()" data-testid="clear-filters" style="background:#666;">Clear</button>
    </div>
    <div id="album-grid" class="album-grid" data-testid="album-grid"></div>
  </main>

  <!-- Cart panel -->
  <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
  <div id="cart-panel" class="cart-panel" style="display:none;">
    <button class="btn-close-cart" onclick="toggleCart()" data-testid="close-cart">&times;</button>
    <h2>Shopping Cart</h2>
    <div id="cart-items" data-testid="cart-items"></div>
    <div id="cart-total" class="cart-total" data-testid="cart-total"></div>
    <button class="btn-clear" onclick="clearCart()" data-testid="clear-cart">Clear Cart</button>
  </div>

  <!-- Album detail modal -->
  <div id="detail-modal" class="modal-overlay" data-testid="album-detail-modal">
    <div class="modal">
      <button class="btn-close" onclick="closeDetail()" data-testid="close-detail">&times;</button>
      <h2 id="detail-title"></h2>
      <div class="meta">
        <span id="detail-artist"></span> · <span id="detail-genre"></span>
      </div>
      <div id="detail-description" class="description"></div>
      <div><span class="price" id="detail-price"></span> · <span class="stock" id="detail-stock"></span></div>
      <div style="margin-top:1rem;">
        <button class="btn-add" id="detail-add-btn" onclick="addToCartFromDetail()" data-testid="detail-add-to-cart">Add to Cart</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.__API_BASE__ || '';
    const SESSION_ID = 'session-' + Math.random().toString(36).substring(2, 10);
    let allAlbums = [];
    let cartItems = [];
    let currentDetailAlbum = null;

    async function fetchAlbums(params = '') {
      const res = await fetch(`${API_BASE}/albums${params}`);
      return res.json();
    }

    async function loadAlbums(params = '') {
      allAlbums = await fetchAlbums(params);
      renderAlbums(allAlbums);
    }

    function renderAlbums(albums) {
      const grid = document.getElementById('album-grid');
      if (albums.length === 0) {
        grid.innerHTML = '<p data-testid="no-results" style="color:#888;">No albums found.</p>';
        return;
      }
      grid.innerHTML = albums.map(a => `
        <div class="album-card" data-testid="album-card" data-album-id="${a.id}">
          <h3><a href="#" onclick="showDetail(${a.id}); return false;" data-testid="album-title">${esc(a.title)}</a></h3>
          <div class="artist" data-testid="album-artist">${esc(a.artist)}</div>
          <span class="genre" data-testid="album-genre">${esc(a.genre)}</span>
          <div class="price" data-testid="album-price">$${a.price.toFixed(2)}</div>
          <div class="stock" data-testid="album-stock">${a.stock > 0 ? a.stock + ' in stock' : 'Out of stock'}</div>
          <div class="actions">
            <button class="btn-add" data-testid="add-to-cart" onclick="addToCart(${a.id})" ${a.stock === 0 ? 'disabled' : ''}>Add to Cart</button>
          </div>
        </div>
      `).join('');
    }

    async function populateGenres() {
      const albums = await fetchAlbums();
      const genres = [...new Set(albums.map(a => a.genre))].sort();
      const sel = document.getElementById('genre-filter');
      genres.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        sel.appendChild(opt);
      });
    }

    function applyFilters() {
      const genre = document.getElementById('genre-filter').value;
      const maxPrice = document.getElementById('price-filter').value;
      const params = new URLSearchParams();
      if (genre) params.set('genre', genre);
      if (maxPrice) params.set('maxPrice', maxPrice);
      const qs = params.toString();
      loadAlbums(qs ? `?${qs}` : '');
    }

    function clearFilters() {
      document.getElementById('genre-filter').value = '';
      document.getElementById('price-filter').value = '';
      loadAlbums();
    }

    async function showDetail(id) {
      const res = await fetch(`${API_BASE}/albums/${id}`);
      const album = await res.json();
      currentDetailAlbum = album;
      document.getElementById('detail-title').textContent = album.title;
      document.getElementById('detail-artist').textContent = album.artist;
      document.getElementById('detail-genre').textContent = album.genre;
      document.getElementById('detail-description').textContent = album.description || 'No description available.';
      document.getElementById('detail-price').textContent = '$' + album.price.toFixed(2);
      document.getElementById('detail-stock').textContent = album.stock > 0 ? album.stock + ' in stock' : 'Out of stock';
      document.getElementById('detail-add-btn').disabled = album.stock === 0;
      document.getElementById('detail-modal').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('open');
      currentDetailAlbum = null;
    }

    async function addToCart(albumId) {
      const res = await fetch(`${API_BASE}/cart/${SESSION_ID}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ albumId, quantity: 1 }),
      });
      if (res.ok) await refreshCart();
    }

    async function addToCartFromDetail() {
      if (currentDetailAlbum) {
        await addToCart(currentDetailAlbum.id);
        closeDetail();
      }
    }

    async function refreshCart() {
      const res = await fetch(`${API_BASE}/cart/${SESSION_ID}`);
      cartItems = await res.json();
      document.getElementById('cart-count').textContent = cartItems.length;
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      if (cartItems.length === 0) {
        container.innerHTML = '<div class="empty-cart" data-testid="empty-cart">Your cart is empty.</div>';
        document.getElementById('cart-total').textContent = '';
        return;
      }
      container.innerHTML = cartItems.map(item => `
        <div class="cart-item" data-testid="cart-item">
          <div class="info">
            <div class="title" data-testid="cart-item-title">${esc(item.albumTitle)}</div>
            <div class="detail">Qty: ${item.quantity} · $${item.price.toFixed(2)}</div>
          </div>
          <button class="btn-remove" data-testid="remove-from-cart" onclick="removeFromCart(${item.id})">Remove</button>
        </div>
      `).join('');
      const total = cartItems.reduce((sum, i) => sum + i.price * i.quantity, 0);
      document.getElementById('cart-total').textContent = `Total: $${total.toFixed(2)}`;
    }

    async function removeFromCart(itemId) {
      await fetch(`${API_BASE}/cart/${SESSION_ID}/items/${itemId}`, { method: 'DELETE' });
      await refreshCart();
    }

    async function clearCart() {
      await fetch(`${API_BASE}/cart/${SESSION_ID}`, { method: 'DELETE' });
      await refreshCart();
    }

    function toggleCart() {
      const panel = document.getElementById('cart-panel');
      const overlay = document.getElementById('cart-overlay');
      const isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'block';
      overlay.classList.toggle('open', !isOpen);
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Init
    loadAlbums();
    populateGenres();
    refreshCart();
  </script>
</body>
</html>
